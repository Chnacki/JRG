<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wyświetlacz zmianowy — PSP JRG 4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Handjet:wght@700..900&display=swap" rel="stylesheet">
<style>
  html,body{ margin:0; height:100%; background:transparent; }
  body{
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; min-height:100vh;
    font-family:"Segoe UI",Arial,sans-serif;
  }
  .display-box{
    background:transparent; padding:0;
    display:flex; align-items:center; gap:0;
  }
  .display-strip{
    display:flex; align-items:stretch; justify-content:center; gap:0;
    background:#0a0a0a; border-radius:6px; overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
  }
  .display-strip .cap{ width:26px; background:linear-gradient(90deg,#3a3a3a,#1c1c1c); flex-shrink:0; }
  .display-strip .cells{
    display:flex; align-items:center; justify-content:space-evenly; gap:20px;
    background:#050505; padding:24px 40px;
  }
  .display-strip .cell{
    font-size:150px; line-height:1; font-weight:800; font-family:'Handjet', monospace; color:#210a08; transition:none;
  }
  .display-strip .cell.lit{ color:#ff2a1a; text-shadow:0 0 26px #ff5a3c, 0 0 8px #ff2a1a; }
  .bell-inline{ display:flex; align-items:center; }
  .bell-inline svg{ width:64px; height:64px; }
  .bell-inline path{ fill:#210a08; }
  .bell-inline.lit path{ fill:#ff2a1a; filter:drop-shadow(0 0 10px #ff5a3c); }
  audio{ display:none; }
</style>
</head>
<body>
  <div style="position:fixed; top:10px; left:10px; background:#0a0a0a; color:#8fb0a0; font-size:11px; padding:5px 10px; border-radius:5px;" id="statusLine">łączenie z serwerem…</div>
  <div class="display-box">
    <div class="display-strip">
      <div class="cap"></div>
      <div class="cells">
        <span class="cell" id="cell-1">1</span>
        <span class="cell" id="cell-2">2</span>
        <span class="cell" id="cell-0">0</span>
        <span class="bell-inline" id="bellPanel">
          <svg viewBox="0 0 24 24"><path d="M12 2a1 1 0 0 0-1 1v.09A7 7 0 0 0 5 10v4l-1.7 2.55A1 1 0 0 0 4.14 18h15.72a1 1 0 0 0 .84-1.45L19 14v-4a7 7 0 0 0-6-6.91V3a1 1 0 0 0-1-1zm0 20a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22z"/></svg>
        </span>
      </div>
      <div class="cap"></div>
    </div>
  </div>

<audio id="snd-alarm" src="Alarm_JRG.mp3" preload="auto"></audio>
<audio id="snd-komunikat" src="Komunikat.mp3" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="shared.js"></script>
<script src="sync.js"></script>
<script>
let state = loadState();
const audioEls = { alarm: document.getElementById('snd-alarm'), komunikat: document.getElementById('snd-komunikat') };
let blinkPhase = false;
let bellCtx = null;

function unlockAudio(){
  [audioEls.alarm, audioEls.komunikat].forEach(el=>{
    el.play().then(()=>{ el.pause(); el.currentTime = 0; }).catch(()=>{});
  });
  if(!bellCtx) bellCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (bellCtx.state === 'suspended') bellCtx.resume();
}
// pierwsza dowolna interakcja ze stroną (klik/klawisz) cicho odblokowuje dźwięk - wymóg przeglądarek
document.addEventListener('click', unlockAudio, { once:true });
document.addEventListener('keydown', unlockAudio, { once:true });

function beep(){
  try{
    if(!bellCtx) bellCtx = new (window.AudioContext||window.webkitAudioContext)();
    const o = bellCtx.createOscillator(); const g = bellCtx.createGain();
    o.frequency.value = 1200; o.type='sine';
    g.gain.setValueAtTime(0.15, bellCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, bellCtx.currentTime+0.18);
    o.connect(g); g.connect(bellCtx.destination);
    o.start(); o.stop(bellCtx.currentTime+0.2);
  }catch(e){}
}

function render(){
  const active = state.alarm.active || [];
  [1,2,0].forEach(n=>{
    const cell = document.getElementById('cell-'+n);
    const isActive = active.includes(n);
    cell.classList.toggle('lit', isActive && blinkPhase);
  });
  const bell = document.getElementById('bellPanel');
  bell.className = 'bell-inline' + ((active.length>0 && blinkPhase) ? ' lit' : '');
}

setInterval(()=>{
  blinkPhase = !blinkPhase;
  if (state.alarm && state.alarm.active && state.alarm.active.length>0 && blinkPhase) beep();
  render();
}, 500);

onRemoteMessage({
  onState: (s)=>{ state = sanitizeState(s); render(); },
  onSound: (name)=>{ playLocalSound(name, audioEls); }
});
setSyncStatusCallback((s)=>{
  const map = { SUBSCRIBED:'połączono z serwerem', CHANNEL_ERROR:'błąd połączenia', TIMED_OUT:'przekroczono czas', CLOSED:'rozłączono' };
  document.getElementById('statusLine').textContent = map[s] || s;
});

render();
</script>
</body>
</html>
